# No build step — the site is pre-built and committed as static files.
# Netlify just serves what's in the repo. Nothing to compile, nothing to cache wrong.

[build]
  publish = "."
  functions = "netlify/functions"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
[[headers]]
  for = "/rss.xml"
  [headers.values]
    Content-Type = "application/rss+xml; charset=utf-8"
[[headers]]
  for = "/llms.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"

# pretty URLs: /my-post -> /my-post.html
[[redirects]]
  from = "/:slug"
  to = "/:slug.html"
  status = 200
  force = false
