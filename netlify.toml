# Netlify builds the blog from /posts on every commit.
# Drop a .md file into /posts on GitHub -> Netlify rebuilds -> live. No dashboard needed.

[build]
  command = "npm run build"
  publish = "."

[build.environment]
  NODE_VERSION = "20"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
[[headers]]
  for = "/rss.xml"
  [headers.values]
    Content-Type = "application/rss+xml; charset=utf-8"
[[headers]]
  for = "/llms.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
[[headers]]
  for = "/llms-full.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"

[[redirects]]
  from = "/:slug"
  to = "/:slug.html"
  status = 200
  force = false

[functions]
  directory = "netlify/functions"
